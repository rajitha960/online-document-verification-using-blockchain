{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #f9a6dd);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.login-container {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    width: 380px;
    padding: 35px;
    border-radius: 15px;
    background: #ffffff;
    box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.2);
}

.login-title {
    font-weight: 600;
    text-align: center;
    margin-bottom: 25px;
}

.form-control {
    border-radius: 8px;
}

.btn-login {
    width: 100%;
    border-radius: 8px;
    font-weight: 500;
}

.register-text {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}
</style>

<div class="login-container">
    <div class="login-card">

        <h3 class="login-title">🔐 Login</h3>

        <form method="POST">

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fa fa-user"></i>
                    </span>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Enter your username"
                           required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fa fa-lock"></i>
                    </span>
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter your password"
                           required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Login
            </button>

        </form>

        <p class="register-text">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register here</a>
        </p>

    </div>
</div>

{% endblock %}
